kind = "web"
previewPath = "/"
title = "منصة التبرعات الصغيرة"
version = "1.0.0"
id = "artifacts/charity-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21463

[services.development]
run = "pnpm --filter @workspace/charity-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/charity-web", "run", "build" ]
publicDir = "artifacts/charity-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21463"
BASE_PATH = "/"
